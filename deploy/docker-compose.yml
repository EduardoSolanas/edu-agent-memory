version: '3.8'

services:
  openvino-server:
    build:
      context: ./openvino-server
      dockerfile: Dockerfile
    container_name: openvino-server
    restart: always
    privileged: true
    network_mode: host
    devices:
      - /dev/dri:/dev/dri

  api-daemon:
    build:
      context: ..
      dockerfile: deploy/api-daemon/Dockerfile
    container_name: api-daemon
    restart: always
    network_mode: host
    env_file:
      - ../.env

  qdrant:
    image: qdrant/qdrant:latest
    container_name: edumem-qdrant
    restart: always
    privileged: true
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /opt/qdrant_storage:/qdrant/storage
